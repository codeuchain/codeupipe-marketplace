<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codeupipe Marketplace</title>
  <meta name="description" content="Browse connectors, filters, hooks, and bundles for codeupipe pipelines.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
  <style>
/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ────────────────────────────────────────────────── */
:root {
  --bg-base:       #0d1117;
  --bg-surface:    #161b22;
  --bg-elevated:   #1c2129;
  --bg-hover:      #21262d;
  --border:        #30363d;
  --border-light:  #3d444d;
  --text-primary:  #e6edf3;
  --text-secondary:#8b949e;
  --text-muted:    #6e7681;
  --accent:        #7c4dff;
  --accent-dim:    #5e35b1;
  --accent-glow:   rgba(124,77,255,0.15);
  --amber:         #ffab00;
  --amber-dim:     #ff8f00;
  --green:         #3fb950;
  --blue:          #58a6ff;
  --red:           #f85149;
  --star:          #e3b341;
  --star-dim:      rgba(227,179,65,0.15);
  --radius:        8px;
  --radius-lg:     12px;
  --shadow:        0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg:     0 8px 32px rgba(0,0,0,0.5);
  --font:          -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  --font-mono:     'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  --transition:    150ms ease;
}

body {
  font-family: var(--font);
  background: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Header ────────────────────────────────────────────────── */
.header {
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 64px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  text-decoration: none;
}
.logo:hover { text-decoration: none; }
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--amber));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo span { color: var(--accent); }
.logo em { font-style: normal; color: var(--text-muted); font-weight: 400; }
.header-links {
  display: flex; align-items: center; gap: 16px; margin-left: auto; font-size: 14px;
}
.header-links a { color: var(--text-secondary); transition: color var(--transition); }
.header-links a:hover { color: var(--text-primary); text-decoration: none; }

/* ── Search Bar ────────────────────────────────────────────── */
.search-section { max-width: 1280px; margin: 0 auto; padding: 32px 24px 0; }
.search-wrap { position: relative; max-width: 600px; }
.search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none; font-size: 16px;
}
.search-input {
  width: 100%; padding: 12px 16px 12px 42px; font-size: 15px;
  font-family: var(--font); background: var(--bg-surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-primary); outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* ── Toolbar ───────────────────────────────────────────────── */
.toolbar {
  max-width: 1280px; margin: 0 auto; padding: 20px 24px 0;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; font-size: 13px; font-weight: 500;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text-secondary);
  cursor: pointer; transition: all var(--transition); user-select: none;
}
.chip:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-hover); }
.chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }
.chip .count {
  font-size: 11px; background: var(--bg-hover); padding: 1px 6px;
  border-radius: 10px; color: var(--text-muted);
}
.chip.active .count { background: var(--accent-dim); color: #fff; }
.toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.stat-text { font-size: 13px; color: var(--text-muted); }
.sort-select {
  font-size: 13px; font-family: var(--font); padding: 4px 8px;
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-secondary);
  cursor: pointer; outline: none;
}
.sort-select:focus { border-color: var(--accent); }

/* ── Card Grid ─────────────────────────────────────────────── */
.grid-section { max-width: 1280px; margin: 0 auto; padding: 24px; }
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px;
}

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; cursor: pointer;
  transition: all var(--transition); display: flex; flex-direction: column; gap: 12px;
}
.card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow), 0 0 0 1px var(--accent-glow);
  transform: translateY(-2px);
}
.card-header { display: flex; align-items: flex-start; gap: 12px; }
.card-icon {
  width: 48px; height: 48px; background: var(--bg-elevated);
  border-radius: var(--radius); display: flex; align-items: center;
  justify-content: center; font-size: 22px; flex-shrink: 0;
  border: 1px solid var(--border);
}
.card-title-group { flex: 1; min-width: 0; }
.card-name { font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
.card-provider { font-size: 13px; color: var(--text-secondary); }
.card-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: auto; }

/* ── Stars on cards ────────────────────────────────────────── */
.star-count {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 12px; color: var(--star); font-weight: 600;
}
.star-count .star-icon { font-size: 13px; }

/* ── Card Contributors Row ─────────────────────────────────── */
.card-contributors { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.avatar-stack { display: flex; align-items: center; }
.avatar-stack .avatar {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--bg-surface); margin-left: -6px;
  object-fit: cover; background: var(--bg-elevated); cursor: pointer;
}
.avatar-stack .avatar:first-child { margin-left: 0; }
.avatar-fallback {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--bg-surface); margin-left: -6px;
  background: var(--accent-dim); color: #fff; font-size: 10px;
  font-weight: 700; display: inline-flex; align-items: center;
  justify-content: center; flex-shrink: 0; cursor: pointer;
}
.avatar-fallback:first-child { margin-left: 0; }
.card-contributors .contrib-text { font-size: 12px; color: var(--text-muted); }

.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 3px 8px; border-radius: 4px;
}
.badge-verified { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.badge-community { background: rgba(88,166,255,0.15); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
.badge-type { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border); }
.card-version { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
.card-cats { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-tag {
  font-size: 11px; padding: 2px 8px; background: var(--bg-elevated);
  border-radius: 10px; color: var(--text-muted); border: 1px solid var(--border);
}

/* ── Detail Modal ──────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); z-index: 200;
  justify-content: center; align-items: flex-start;
  padding: 60px 24px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); max-width: 720px; width: 100%;
  box-shadow: var(--shadow-lg); animation: modalIn 200ms ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header { display: flex; align-items: flex-start; gap: 16px; padding: 24px 24px 0; }
.modal-icon {
  width: 64px; height: 64px; background: var(--bg-elevated);
  border-radius: var(--radius); display: flex; align-items: center;
  justify-content: center; font-size: 30px; flex-shrink: 0;
  border: 1px solid var(--border);
}
.modal-title-group { flex: 1; }
.modal-name { font-size: 22px; font-weight: 700; }
.modal-author { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
.modal-stars {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 14px; color: var(--star); font-weight: 600; margin-top: 4px;
}
.modal-stars a { color: var(--star); text-decoration: none; }
.modal-stars a:hover { text-decoration: underline; }
.modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 24px; cursor: pointer; padding: 4px 8px;
  border-radius: 4px; line-height: 1; transition: all var(--transition);
}
.modal-close:hover { color: var(--text-primary); background: var(--bg-hover); }

/* ── Modal Tabs ────────────────────────────────────────────── */
.modal-tabs { display: flex; gap: 0; padding: 16px 24px 0; border-bottom: 1px solid var(--border); }
.modal-tab {
  padding: 8px 16px; font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all var(--transition);
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font);
}
.modal-tab:hover { color: var(--text-secondary); }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.modal-tab-panel { display: none; padding: 20px 24px 24px; }
.modal-tab-panel.active { display: block; }

/* ── Modal Body ────────────────────────────────────────────── */
.modal-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 20px; }
.modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.detail-item label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-muted); margin-bottom: 4px;
}
.detail-item span, .detail-item a { font-size: 14px; color: var(--text-primary); }
.detail-item code {
  font-family: var(--font-mono); font-size: 13px;
  background: var(--bg-elevated); padding: 2px 6px;
  border-radius: 4px; border: 1px solid var(--border);
}
.filters-section h3 {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px;
}
.filter-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.filter-tag {
  font-family: var(--font-mono); font-size: 13px; padding: 4px 10px;
  background: var(--accent-glow); border: 1px solid var(--accent-dim);
  border-radius: 6px; color: var(--accent);
}
.install-section {
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.install-section h3 {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 10px;
}
.install-cmd { display: flex; align-items: center; gap: 8px; }
.install-cmd code {
  flex: 1; font-family: var(--font-mono); font-size: 14px;
  color: var(--green); background: var(--bg-base);
  padding: 10px 14px; border-radius: 6px;
  border: 1px solid var(--border); user-select: all;
}
.install-cmd button {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 16px; border-radius: 6px; font-size: 13px;
  font-weight: 600; cursor: pointer; transition: background var(--transition);
  white-space: nowrap;
}
.install-cmd button:hover { background: var(--accent-dim); }

/* ── Contributors Tab ──────────────────────────────────────── */
.contributors-panel h3 {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px;
}
.contributor-list { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.contributor-card {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: var(--radius);
  min-width: 200px; cursor: pointer; transition: all var(--transition);
}
.contributor-card:hover { border-color: var(--accent); background: var(--bg-hover); }
.contributor-card .avatar-lg {
  width: 36px; height: 36px; border-radius: 50%;
  object-fit: cover; background: var(--bg-hover); flex-shrink: 0;
}
.contributor-card .avatar-lg-fallback {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent-dim); color: #fff; font-size: 14px;
  font-weight: 700; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0;
}
.contributor-card .contrib-info { flex: 1; min-width: 0; }
.contributor-card .contrib-name {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.contributor-card .contrib-role { font-size: 11px; color: var(--text-muted); }
.contributor-card .op-badge {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 2px 6px; border-radius: 3px;
  background: rgba(255,171,0,0.15); color: var(--amber);
  border: 1px solid rgba(255,171,0,0.3); flex-shrink: 0;
}

/* ── Commit Timeline ───────────────────────────────────────── */
.timeline { position: relative; padding-left: 24px; }
.timeline::before {
  content: ''; position: absolute; left: 11px; top: 4px; bottom: 4px;
  width: 2px; background: var(--border); border-radius: 1px;
}
.timeline-item {
  position: relative; padding-bottom: 16px;
  display: flex; gap: 12px; align-items: flex-start;
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot {
  position: absolute; left: -19px; top: 6px; width: 8px; height: 8px;
  background: var(--accent); border-radius: 50%;
  border: 2px solid var(--bg-surface); z-index: 1;
}
.timeline-item:last-child .timeline-dot { background: var(--amber); }
.timeline-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  object-fit: cover; background: var(--bg-elevated); flex-shrink: 0;
  cursor: pointer;
}
.timeline-avatar-fallback {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent-dim); color: #fff; font-size: 10px;
  font-weight: 700; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; cursor: pointer;
}
.timeline-content { flex: 1; min-width: 0; }
.timeline-msg { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
.timeline-meta {
  font-size: 12px; color: var(--text-muted); margin-top: 2px;
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.timeline-meta a { font-family: var(--font-mono); font-size: 11px; color: var(--blue); }
.timeline-meta .author-name {
  font-weight: 500; color: var(--text-secondary); cursor: pointer;
}
.timeline-meta .author-name:hover { color: var(--accent); text-decoration: underline; }
.no-history { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.no-history .no-icon { font-size: 32px; margin-bottom: 8px; }
.no-history .no-text { font-size: 14px; }

/* ── Profile Overlay ───────────────────────────────────────── */
.profile-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); z-index: 300;
  justify-content: center; align-items: flex-start;
  padding: 60px 24px; overflow-y: auto;
}
.profile-overlay.open { display: flex; }
.profile-modal {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); max-width: 640px; width: 100%;
  box-shadow: var(--shadow-lg); animation: modalIn 200ms ease;
  padding: 24px;
}
.profile-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.profile-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  object-fit: cover; background: var(--bg-elevated);
}
.profile-avatar-fallback {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--accent-dim); color: #fff; font-size: 24px;
  font-weight: 700; display: flex; align-items: center;
  justify-content: center;
}
.profile-info { flex: 1; }
.profile-name { font-size: 20px; font-weight: 700; }
.profile-email { font-size: 13px; color: var(--text-muted); }
.profile-stats {
  display: flex; gap: 20px; margin-top: 6px; font-size: 13px; color: var(--text-secondary);
}
.profile-stats strong { color: var(--text-primary); }
.profile-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 24px; cursor: pointer; padding: 4px 8px;
  border-radius: 4px; line-height: 1; transition: all var(--transition);
  align-self: flex-start;
}
.profile-close:hover { color: var(--text-primary); background: var(--bg-hover); }
.profile-section-title {
  font-size: 13px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px;
}
.profile-component {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; cursor: pointer; transition: all var(--transition);
}
.profile-component:hover { border-color: var(--accent); background: var(--bg-hover); }
.profile-comp-icon { font-size: 24px; flex-shrink: 0; }
.profile-comp-info { flex: 1; min-width: 0; }
.profile-comp-name { font-size: 14px; font-weight: 600; }
.profile-comp-desc {
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-comp-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.profile-comp-role {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px;
}
.profile-comp-role.op {
  background: rgba(255,171,0,0.15); color: var(--amber); border: 1px solid rgba(255,171,0,0.3);
}
.profile-comp-role.contributor {
  background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent-dim);
}

/* ── Empty / Loading ───────────────────────────────────────── */
.empty-state { text-align: center; padding: 80px 24px; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.empty-desc { font-size: 14px; color: var(--text-muted); }
.loading { text-align: center; padding: 80px 24px; color: var(--text-muted); }
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Footer ────────────────────────────────────────────────── */
.footer {
  max-width: 1280px; margin: 0 auto; padding: 32px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: var(--text-muted); flex-wrap: wrap; gap: 12px;
}
.footer-links { display: flex; gap: 16px; }
.footer a { color: var(--text-secondary); }
.footer a:hover { color: var(--text-primary); }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 640px) {
  .header-inner { gap: 12px; }
  .logo em { display: none; }
  .card-grid { grid-template-columns: 1fr; }
  .detail-grid { grid-template-columns: 1fr; }
  .modal-overlay, .profile-overlay { padding: 24px 12px; }
  .contributor-card { min-width: 160px; }
}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href=".">
        <div class="logo-icon">⚡</div>
        <span>codeupipe</span> <em>Marketplace</em>
      </a>
      <nav class="header-links">
        <a href="https://codeuchain.github.io/codeupipe/" target="_blank">Docs</a>
        <a href="https://github.com/codeuchain/codeupipe" target="_blank">GitHub</a>
        <a href="https://github.com/codeuchain/codeupipe-marketplace" target="_blank">Contribute</a>
      </nav>
    </div>
  </header>

  <section class="search-section">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput"
             placeholder="Search components or contributors…" autocomplete="off" autofocus>
    </div>
  </section>

  <div class="toolbar" id="toolbar"></div>

  <section class="grid-section" id="gridSection">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading marketplace index…</div>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </section>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-title-group">
          <div class="modal-name" id="modalName"></div>
          <div class="modal-author" id="modalAuthor"></div>
          <div class="modal-stars" id="modalStars"></div>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="details">Details</button>
        <button class="modal-tab" data-tab="contributors">Contributors</button>
      </div>
      <div class="modal-tab-panel active" id="panelDetails" data-tab="details">
        <p class="modal-desc" id="modalDesc"></p>
        <div class="modal-badges" id="modalBadges"></div>
        <div class="detail-grid" id="modalDetails"></div>
        <div class="filters-section" id="modalFilters"></div>
        <div class="install-section">
          <h3>Install</h3>
          <div class="install-cmd">
            <code id="installCmd"></code>
            <button id="copyBtn">Copy</button>
          </div>
        </div>
      </div>
      <div class="modal-tab-panel contributors-panel" id="panelContributors" data-tab="contributors">
        <div id="contributorsContent"></div>
      </div>
    </div>
  </div>

  <!-- Profile Overlay -->
  <div class="profile-overlay" id="profileOverlay">
    <div class="profile-modal" id="profileModal">
      <div class="profile-header">
        <div id="profileAvatar"></div>
        <div class="profile-info">
          <div class="profile-name" id="profileName"></div>
          <div class="profile-email" id="profileEmail"></div>
          <div class="profile-stats" id="profileStats"></div>
        </div>
        <button class="profile-close" id="profileClose" aria-label="Close">&times;</button>
      </div>
      <div class="profile-section-title">Components</div>
      <div id="profileComponents"></div>
    </div>
  </div>

  <footer class="footer">
    <span>codeupipe marketplace — <a href="https://pypi.org/project/codeupipe/" target="_blank">pip install codeupipe</a></span>
    <div class="footer-links">
      <a href="https://github.com/codeuchain/codeupipe-marketplace/blob/main/CONTRIBUTING.md" target="_blank">Submit a Component</a>
      <a href="https://github.com/codeuchain/codeupipe-marketplace/issues" target="_blank">Report Issue</a>
    </div>
  </footer>

<script>
(function () {
  "use strict";

  // ── Config ──────────────────────────────────────────────
  var INDEX_URL = "https://raw.githubusercontent.com/codeuchain/codeupipe-marketplace/main/index.json";
  var INDEX_FALLBACK = "./index.json";
  var CONTRIBUTORS_FALLBACK = "./contributors.json";
  var REPO_BASE = "https://github.com/codeuchain/codeupipe-marketplace";

  var PROVIDER_ICONS = {
    "google-ai": "🤖", "stripe": "💳", "postgres": "🐘", "resend": "✉️",
    "redis": "🔴", "openai": "🧠", "slack": "💬", "github": "🐙",
    "aws": "☁️", "firebase": "🔥"
  };
  var DEFAULT_ICON = "📦";

  // ── State ───────────────────────────────────────────────
  var allComponents = [];
  var contributorsData = {};
  var starsCache = {};       // "owner/repo" → star count
  var activeTypeFilter = null;
  var activeTrustFilter = null;
  var searchQuery = "";
  var sortMode = "name";     // "name" | "stars" | "newest"

  // ── DOM refs ────────────────────────────────────────────
  var $searchInput  = document.getElementById("searchInput");
  var $toolbar      = document.getElementById("toolbar");
  var $loading      = document.getElementById("loading");
  var $cardGrid     = document.getElementById("cardGrid");
  var $modalOverlay = document.getElementById("modalOverlay");
  var $profileOverlay = document.getElementById("profileOverlay");

  // ── Fetch helpers ───────────────────────────────────────
  function fetchJSON(fallback, remote) {
    return fetch(fallback).then(function(r) {
      if (r.ok) return r.json();
      if (remote) return fetch(remote).then(function(r2) { return r2.ok ? r2.json() : null; });
      return null;
    }).catch(function() {
      if (remote) return fetch(remote).then(function(r) { return r.ok ? r.json() : null; }).catch(function() { return null; });
      return null;
    });
  }

  // ── GitHub Stars ────────────────────────────────────────
  function parseRepoSlug(repoUrl) {
    // "https://github.com/codeuchain/codeupipe-stripe" → "codeuchain/codeupipe-stripe"
    if (!repoUrl) return null;
    var m = repoUrl.match(/github\.com\/([^\/]+\/[^\/]+)/);
    return m ? m[1].replace(/\.git$/, "") : null;
  }

  function fetchStars(slug) {
    if (!slug) return Promise.resolve(null);
    if (slug in starsCache) return Promise.resolve(starsCache[slug]);
    return fetch("https://api.github.com/repos/" + slug, { headers: { Accept: "application/vnd.github.v3+json" } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (data && typeof data.stargazers_count === "number") {
          starsCache[slug] = data.stargazers_count;
          return data.stargazers_count;
        }
        return null;
      })
      .catch(function() { return null; });
  }

  function fetchAllStars() {
    var slugs = [];
    allComponents.forEach(function(c) {
      var s = parseRepoSlug(c.repo);
      if (s && slugs.indexOf(s) === -1) slugs.push(s);
    });
    // Fetch sequentially to stay within rate limits
    return slugs.reduce(function(chain, slug) {
      return chain.then(function() { return fetchStars(slug); });
    }, Promise.resolve());
  }

  function getStars(c) {
    var slug = parseRepoSlug(c.repo);
    return slug ? (starsCache[slug] || 0) : 0;
  }

  // ── Helpers ─────────────────────────────────────────────
  function iconFor(p) { return PROVIDER_ICONS[p] || DEFAULT_ICON; }
  function initial(n) { return (n || "?").charAt(0).toUpperCase(); }

  function trustBadge(t) {
    var cls = t === "verified" ? "badge-verified" : "badge-community";
    var ic = t === "verified" ? "✓" : "⬡";
    return '<span class="badge ' + cls + '">' + ic + " " + t + "</span>";
  }
  function typeBadge(t) { return '<span class="badge badge-type">' + t + "</span>"; }

  function relativeTime(d) {
    if (!d) return "";
    var diff = Date.now() - new Date(d).getTime();
    var days = Math.floor(diff / 86400000);
    if (days > 365) return Math.floor(days / 365) + "y ago";
    if (days > 30)  return Math.floor(days / 30) + "mo ago";
    if (days > 0)   return days + "d ago";
    var hrs = Math.floor(diff / 3600000);
    if (hrs > 0) return hrs + "h ago";
    var mins = Math.floor(diff / 60000);
    return mins > 0 ? mins + "m ago" : "just now";
  }

  function escapeHTML(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function avatarImg(url, name, cls) {
    var i = initial(name);
    var fbCls = cls.indexOf("-lg") >= 0
      ? cls.replace("avatar-lg", "avatar-lg-fallback")
      : cls.replace("avatar", "avatar-fallback");
    if (cls === "profile-avatar") fbCls = "profile-avatar-fallback";
    if (cls === "timeline-avatar") fbCls = "timeline-avatar-fallback";
    return '<img class="' + cls + '" src="' + url + '" alt="' + escapeHTML(name) + '" ' +
      'onerror="this.outerHTML=\'<span class=&quot;' + fbCls + '&quot;>' + i + '</span>\'">';
  }

  function starsHTML(count) {
    if (count === null || count === undefined) return "";
    return '<span class="star-count"><span class="star-icon">⭐</span> ' + count + "</span>";
  }

  // ── Search ──────────────────────────────────────────────
  function matchesSearch(c, q) {
    if (!q) return true;
    var lower = q.toLowerCase();
    var haystack = [c.name, c.provider, c.description, c.author].concat(c.categories || []).concat(c.filters || []);
    // Also search contributor names
    var cd = contributorsData[c.name];
    if (cd && cd.contributors) {
      cd.contributors.forEach(function(p) { haystack.push(p.name); });
    }
    haystack = haystack.join(" ").toLowerCase();
    return lower.split(/\s+/).every(function(w) { return haystack.includes(w); });
  }

  // ── Filter + Sort ───────────────────────────────────────
  function getFiltered() {
    var list = allComponents.filter(function(c) {
      if (activeTypeFilter && c.type !== activeTypeFilter) return false;
      if (activeTrustFilter && c.trust !== activeTrustFilter) return false;
      return matchesSearch(c, searchQuery);
    });
    if (sortMode === "stars") {
      list.sort(function(a, b) { return getStars(b) - getStars(a); });
    } else if (sortMode === "newest") {
      list.sort(function(a, b) {
        var da = contributorsData[a.name], db = contributorsData[b.name];
        var ta = da && da.created_at ? new Date(da.created_at).getTime() : 0;
        var tb = db && db.created_at ? new Date(db.created_at).getTime() : 0;
        return tb - ta;
      });
    } else {
      list.sort(function(a, b) { return a.name.localeCompare(b.name); });
    }
    return list;
  }

  function render() { renderChips(); renderCards(getFiltered()); }

  // ── Chips ───────────────────────────────────────────────
  function renderChips() {
    var types = {}, trusts = {};
    allComponents.forEach(function(c) {
      types[c.type] = (types[c.type] || 0) + 1;
      trusts[c.trust] = (trusts[c.trust] || 0) + 1;
    });
    var html = "";
    Object.keys(types).sort().forEach(function(t) {
      var a = activeTypeFilter === t ? " active" : "";
      html += '<span class="chip' + a + '" data-filter="type" data-value="' + t + '">' +
        t + ' <span class="count">' + types[t] + '</span></span>';
    });
    if (Object.keys(types).length && Object.keys(trusts).length) {
      html += '<span style="color:var(--border);padding:0 4px">│</span>';
    }
    Object.keys(trusts).sort().forEach(function(t) {
      var a = activeTrustFilter === t ? " active" : "";
      var ic = t === "verified" ? "✓ " : "";
      html += '<span class="chip' + a + '" data-filter="trust" data-value="' + t + '">' +
        ic + t + ' <span class="count">' + trusts[t] + '</span></span>';
    });
    var filtered = getFiltered();
    html += '<span class="toolbar-right">' +
      '<span class="stat-text">' + filtered.length + ' of ' + allComponents.length + ' components</span>' +
      '<select class="sort-select" id="sortSelect">' +
      '<option value="name"' + (sortMode === "name" ? " selected" : "") + '>Sort: A–Z</option>' +
      '<option value="stars"' + (sortMode === "stars" ? " selected" : "") + '>Sort: ⭐ Stars</option>' +
      '<option value="newest"' + (sortMode === "newest" ? " selected" : "") + '>Sort: Newest</option>' +
      '</select></span>';
    $toolbar.innerHTML = html;

    $toolbar.querySelectorAll(".chip").forEach(function(chip) {
      chip.addEventListener("click", function() {
        var ft = chip.dataset.filter, val = chip.dataset.value;
        if (ft === "type") activeTypeFilter = activeTypeFilter === val ? null : val;
        else activeTrustFilter = activeTrustFilter === val ? null : val;
        render();
      });
    });
    var sel = document.getElementById("sortSelect");
    if (sel) sel.addEventListener("change", function() { sortMode = sel.value; render(); });
  }

  // ── Cards ───────────────────────────────────────────────
  function renderCards(filtered) {
    if (!filtered.length) {
      $cardGrid.innerHTML =
        '<div class="empty-state" style="grid-column:1/-1">' +
        '<div class="empty-icon">🔍</div>' +
        '<div class="empty-title">No components found</div>' +
        '<div class="empty-desc">Try a different search or clear your filters.</div></div>';
      return;
    }
    $cardGrid.innerHTML = filtered.map(function(c) {
      var cd = contributorsData[c.name];
      var contribHTML = "";
      if (cd && cd.contributors && cd.contributors.length) {
        var avatars = cd.contributors.slice(0, 4).map(function(p) {
          return avatarImg(p.avatar, p.name, "avatar");
        }).join("");
        var extra = cd.contributors.length > 4
          ? ' <span class="contrib-text">+' + (cd.contributors.length - 4) + "</span>" : "";
        var label = cd.contributors.length === 1 ? "1 contributor" : cd.contributors.length + " contributors";
        contribHTML = '<div class="card-contributors"><div class="avatar-stack">' +
          avatars + '</div>' + extra + '<span class="contrib-text">' + label + '</span></div>';
      }
      var stars = getStars(c);
      return '<article class="card" data-name="' + c.name + '">' +
        '<div class="card-header"><div class="card-icon">' + iconFor(c.provider) + '</div>' +
        '<div class="card-title-group"><div class="card-name">' + c.name + '</div>' +
        '<div class="card-provider">' + c.author + '</div></div></div>' +
        '<p class="card-desc">' + c.description + '</p>' +
        '<div class="card-cats">' +
        (c.categories || []).map(function(cat) { return '<span class="cat-tag">' + cat + "</span>"; }).join("") +
        '</div>' + contribHTML +
        '<div class="card-meta">' + trustBadge(c.trust) + typeBadge(c.type) +
        '<span class="card-version">v' + c.latest + '</span>' +
        (stars > 0 ? starsHTML(stars) : "") +
        '</div></article>';
    }).join("");

    $cardGrid.querySelectorAll(".card").forEach(function(card) {
      card.addEventListener("click", function(e) {
        // If clicking an avatar in the stack, open profile instead
        if (e.target.closest(".avatar-stack")) {
          e.stopPropagation();
          return;
        }
        var comp = allComponents.find(function(c) { return c.name === card.dataset.name; });
        if (comp) openModal(comp);
      });
    });

    // Bind avatar clicks on cards to open profiles
    $cardGrid.querySelectorAll(".avatar-stack .avatar, .avatar-stack .avatar-fallback").forEach(function(av) {
      av.addEventListener("click", function(e) {
        e.stopPropagation();
        var name = av.alt || av.textContent;
        var cardEl = av.closest(".card");
        var compName = cardEl ? cardEl.dataset.name : null;
        if (compName) {
          var cd = contributorsData[compName];
          if (cd && cd.contributors) {
            var person = cd.contributors.find(function(p) { return p.name === name; });
            if (person) { openProfile(person); return; }
          }
        }
      });
    });
  }

  // ── Tabs ────────────────────────────────────────────────
  function initTabs() {
    document.querySelectorAll(".modal-tab").forEach(function(tab) {
      tab.addEventListener("click", function() {
        var target = tab.dataset.tab;
        document.querySelectorAll(".modal-tab").forEach(function(t) { t.classList.remove("active"); });
        document.querySelectorAll(".modal-tab-panel").forEach(function(p) { p.classList.remove("active"); });
        tab.classList.add("active");
        var panel = document.querySelector('.modal-tab-panel[data-tab="' + target + '"]');
        if (panel) panel.classList.add("active");
      });
    });
  }

  // ── Detail Modal ────────────────────────────────────────
  function openModal(c) {
    // Reset to Details tab
    document.querySelectorAll(".modal-tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelectorAll(".modal-tab-panel").forEach(function(p) { p.classList.remove("active"); });
    document.querySelector('.modal-tab[data-tab="details"]').classList.add("active");
    document.getElementById("panelDetails").classList.add("active");

    document.getElementById("modalIcon").textContent = iconFor(c.provider);
    document.getElementById("modalName").textContent = c.name;
    document.getElementById("modalAuthor").textContent = "by " + c.author;
    document.getElementById("modalDesc").textContent = c.description;

    // Stars in header
    var slug = parseRepoSlug(c.repo);
    var starsEl = document.getElementById("modalStars");
    var starVal = slug ? starsCache[slug] : null;
    if (starVal !== null && starVal !== undefined) {
      starsEl.innerHTML = '⭐ <a href="' + c.repo + '/stargazers" target="_blank">' + starVal + ' stars on GitHub</a>';
    } else {
      starsEl.innerHTML = '<a href="' + c.repo + '/stargazers" target="_blank" style="color:var(--text-muted);font-size:12px">⭐ Star on GitHub</a>';
    }

    document.getElementById("modalBadges").innerHTML = trustBadge(c.trust) + typeBadge(c.type);

    document.getElementById("modalDetails").innerHTML =
      '<div class="detail-item"><label>Version</label><span><code>' + c.latest + '</code></span></div>' +
      '<div class="detail-item"><label>Min codeupipe</label><span><code>≥ ' + c.min_codeupipe + '</code></span></div>' +
      '<div class="detail-item"><label>License</label><span>' + c.license + '</span></div>' +
      '<div class="detail-item"><label>PyPI</label>' +
      '<a href="https://pypi.org/project/' + c.pypi + '/" target="_blank">' + c.pypi + '</a></div>' +
      '<div class="detail-item"><label>Repository</label>' +
      '<a href="' + c.repo + '" target="_blank">' + c.repo.replace("https://github.com/", "") + '</a></div>' +
      '<div class="detail-item"><label>Categories</label><span>' + (c.categories || []).join(", ") + '</span></div>';

    var filtersEl = document.getElementById("modalFilters");
    if (c.filters && c.filters.length) {
      filtersEl.innerHTML = '<h3>Exported Filters</h3><div class="filter-list">' +
        c.filters.map(function(f) { return '<span class="filter-tag">' + f + "</span>"; }).join("") +
        '</div>';
    } else { filtersEl.innerHTML = ""; }

    // ── Install command — cup marketplace install ──
    var installCode = "cup marketplace install " + c.name;
    document.getElementById("installCmd").textContent = installCode;
    var copyBtn = document.getElementById("copyBtn");
    copyBtn.textContent = "Copy";
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(installCode).then(function() {
        copyBtn.textContent = "Copied!";
        setTimeout(function() { copyBtn.textContent = "Copy"; }, 1500);
      });
    };

    renderContributorsTab(c);
    $modalOverlay.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function renderContributorsTab(c) {
    var el = document.getElementById("contributorsContent");
    var data = contributorsData[c.name];
    if (!data || !data.commits || !data.commits.length) {
      el.innerHTML = '<div class="no-history"><div class="no-icon">📋</div>' +
        '<div class="no-text">No git history available for this component.</div></div>';
      return;
    }
    var html = '<h3>Contributors</h3><div class="contributor-list">';
    data.contributors.forEach(function(person) {
      var isOP = data.created_by && person.email === data.created_by.email;
      var roleLabel = isOP ? "Original author" : "Contributor";
      var opBadge = isOP ? '<span class="op-badge">OP</span>' : "";
      html += '<div class="contributor-card" data-email="' + escapeHTML(person.email) + '">' +
        avatarImg(person.avatar, person.name, "avatar-lg") +
        '<div class="contrib-info"><div class="contrib-name">' + escapeHTML(person.name) + '</div>' +
        '<div class="contrib-role">' + roleLabel + '</div></div>' + opBadge + '</div>';
    });
    html += '</div><h3>Commit History</h3><div class="timeline">';
    data.commits.forEach(function(commit) {
      var commitUrl = REPO_BASE + "/commit/" + commit.sha_full;
      html += '<div class="timeline-item"><div class="timeline-dot"></div>' +
        avatarImg(commit.avatar, commit.author, "timeline-avatar") +
        '<div class="timeline-content"><div class="timeline-msg">' + escapeHTML(commit.message) + '</div>' +
        '<div class="timeline-meta">' +
        '<span class="author-name" data-email="' + escapeHTML(commit.email) + '">' + escapeHTML(commit.author) + '</span>' +
        '<a href="' + commitUrl + '" target="_blank">' + commit.sha + '</a>' +
        '<span>' + relativeTime(commit.date) + '</span></div></div></div>';
    });
    html += '</div>';
    var manifestPath = "components/" + c.name + "/manifest.json";
    var blameUrl = REPO_BASE + "/blame/main/" + manifestPath;
    html += '<div style="margin-top:20px;text-align:center">' +
      '<a href="' + blameUrl + '" target="_blank" style="font-size:13px;color:var(--text-secondary)">' +
      '📜 View full blame on GitHub →</a></div>';
    el.innerHTML = html;

    // Bind contributor cards → profile
    el.querySelectorAll(".contributor-card").forEach(function(card) {
      card.addEventListener("click", function() {
        var email = card.dataset.email;
        var person = findPersonByEmail(email);
        if (person) openProfile(person);
      });
    });
    // Bind author names in timeline → profile
    el.querySelectorAll(".author-name[data-email]").forEach(function(el2) {
      el2.addEventListener("click", function(e) {
        e.stopPropagation();
        var person = findPersonByEmail(el2.dataset.email);
        if (person) openProfile(person);
      });
    });
    // Bind timeline avatars → profile
    el.querySelectorAll(".timeline-avatar, .timeline-avatar-fallback").forEach(function(av) {
      av.addEventListener("click", function(e) {
        e.stopPropagation();
        var timelineItem = av.closest(".timeline-item");
        if (timelineItem) {
          var nameEl = timelineItem.querySelector(".author-name[data-email]");
          if (nameEl) {
            var person = findPersonByEmail(nameEl.dataset.email);
            if (person) openProfile(person);
          }
        }
      });
    });
  }

  function findPersonByEmail(email) {
    for (var compName in contributorsData) {
      var cd = contributorsData[compName];
      if (cd && cd.contributors) {
        var p = cd.contributors.find(function(c) { return c.email === email; });
        if (p) return p;
      }
    }
    return null;
  }

  function closeModal() {
    $modalOverlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  // ── Profile Overlay ─────────────────────────────────────
  function openProfile(person) {
    document.getElementById("profileAvatar").innerHTML = avatarImg(person.avatar, person.name, "profile-avatar");
    document.getElementById("profileName").textContent = person.name;
    document.getElementById("profileEmail").textContent = person.email;

    // Find all components this person contributed to
    var comps = [];
    var totalCommits = 0;
    var totalStars = 0;
    allComponents.forEach(function(c) {
      var cd = contributorsData[c.name];
      if (!cd || !cd.contributors) return;
      var match = cd.contributors.find(function(p) { return p.email === person.email; });
      if (match) {
        var isOP = cd.created_by && cd.created_by.email === person.email;
        var commitCount = cd.commits.filter(function(cm) { return cm.email === person.email; }).length;
        totalCommits += commitCount;
        totalStars += getStars(c);
        comps.push({ component: c, isOP: isOP, commits: commitCount });
      }
    });

    document.getElementById("profileStats").innerHTML =
      '<span><strong>' + comps.length + '</strong> component' + (comps.length !== 1 ? "s" : "") + '</span>' +
      '<span><strong>' + totalCommits + '</strong> commit' + (totalCommits !== 1 ? "s" : "") + '</span>' +
      (totalStars > 0 ? '<span>⭐ <strong>' + totalStars + '</strong> total stars</span>' : "");

    var html = "";
    comps.forEach(function(entry) {
      var c = entry.component;
      var roleCls = entry.isOP ? "op" : "contributor";
      var roleLabel = entry.isOP ? "OP" : "Contributor";
      html += '<div class="profile-component" data-name="' + c.name + '">' +
        '<div class="profile-comp-icon">' + iconFor(c.provider) + '</div>' +
        '<div class="profile-comp-info"><div class="profile-comp-name">' + c.name + '</div>' +
        '<div class="profile-comp-desc">' + escapeHTML(c.description) + '</div></div>' +
        '<div class="profile-comp-meta">' +
        '<span class="profile-comp-role ' + roleCls + '">' + roleLabel + '</span>' +
        (getStars(c) > 0 ? starsHTML(getStars(c)) : "") +
        '</div></div>';
    });

    if (!comps.length) {
      html = '<div class="no-history"><div class="no-text">No components found for this contributor.</div></div>';
    }

    document.getElementById("profileComponents").innerHTML = html;

    // Bind component clicks → open that component's modal
    document.getElementById("profileComponents").querySelectorAll(".profile-component").forEach(function(el) {
      el.addEventListener("click", function() {
        var comp = allComponents.find(function(c) { return c.name === el.dataset.name; });
        if (comp) {
          closeProfile();
          openModal(comp);
        }
      });
    });

    $profileOverlay.classList.add("open");
  }

  function closeProfile() {
    $profileOverlay.classList.remove("open");
    // Only restore scroll if detail modal is also closed
    if (!$modalOverlay.classList.contains("open")) {
      document.body.style.overflow = "";
    }
  }

  // ── Events ──────────────────────────────────────────────
  document.getElementById("modalClose").addEventListener("click", closeModal);
  $modalOverlay.addEventListener("click", function(e) { if (e.target === $modalOverlay) closeModal(); });
  document.getElementById("profileClose").addEventListener("click", closeProfile);
  $profileOverlay.addEventListener("click", function(e) { if (e.target === $profileOverlay) closeProfile(); });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      if ($profileOverlay.classList.contains("open")) closeProfile();
      else closeModal();
    }
  });

  var searchTimer;
  $searchInput.addEventListener("input", function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() { searchQuery = $searchInput.value.trim(); render(); }, 150);
  });

  // ── Init ────────────────────────────────────────────────
  function init() {
    Promise.all([
      fetchJSON(INDEX_FALLBACK, INDEX_URL),
      fetchJSON(CONTRIBUTORS_FALLBACK, null)
    ]).then(function(results) {
      var data = results[0];
      contributorsData = results[1] || {};
      $loading.style.display = "none";

      if (!data || !data.connectors) {
        $cardGrid.innerHTML =
          '<div class="empty-state" style="grid-column:1/-1">' +
          '<div class="empty-icon">⚠️</div><div class="empty-title">Could not load marketplace</div>' +
          '<div class="empty-desc">Check your network connection or try again later.</div></div>';
        return;
      }

      allComponents = data.connectors;
      initTabs();
      render();

      // Fetch GitHub stars in the background, then re-render
      fetchAllStars().then(function() { render(); });
    });
  }

  init();
})();
</script>
</body>
</html>
